<!DOCTYPE html>
<html>
<head>
    <title>AI DevOps Portal</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
            width: 300px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
        }

        #error {
            color: red;
        }

        #loading {
            display: none;
            color: orange;
        }
    </style>
</head>

<body>

    <div class="container">
    <form onsubmit="handleSubmit(event)">
        <h2>AI DevOps Portal</h2>

        <input type="number" id="inputValue" placeholder="Enter value" />

        <br>

        <button type="submit">Predict</button>

        <p id="loading">Processing...</p>

        <p id="result"></p>
        <p id="error"></p>
    </form>
    </div>

   <script>
async function handleSubmit(event) {
    event.preventDefault();

    let value = document.getElementById("inputValue").value;

    // Clear previous messages
    document.getElementById("error").innerText = "";
    document.getElementById("result").innerText = "";

    // Validate input
    if (!value) {
        document.getElementById("error").innerText = "Please enter a value";
        return;
    }

    // ✅ GET TOKEN
    const token = localStorage.getItem("token");

    if (!token) {
        document.getElementById("error").innerText = "Please login first";
        return;
    }

    // ✅ SHOW LOADING (ADD HERE)
    document.getElementById("loading").style.display = "block";

    try {
        const response = await fetch("http://localhost:5000/api/v1/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": token
            },
            body: JSON.stringify({ value: Number(value) })
        });

        const data = await response.json();

        // ✅ HIDE LOADING (ADD HERE)
        document.getElementById("loading").style.display = "none";

        // Handle unauthorized
        if (response.status === 401) {
            document.getElementById("error").innerText = "Session expired. Please login again.";
            return;
        }

        if (data.success) {
            document.getElementById("result").innerText =
                "Prediction: " + data.data.prediction;
        } else {
            document.getElementById("error").innerText = data.error;
        }

    } catch (err) {

        // ✅ HIDE LOADING (ADD HERE ALSO)
        document.getElementById("loading").style.display = "none";

        document.getElementById("error").innerText = "Backend error";
    }
}
</script>

</body>
</html>
